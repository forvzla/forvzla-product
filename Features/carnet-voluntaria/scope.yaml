validation_gates:
  - id: VG1
    question: "Does this duplicate the pending 'edición de voluntarias' UI in spec-cuidadoras-coordinacion-ui.md?"
    method: internal-review
    icp_required: null
    owner: PM
    status: answered
    answer: >
      Confirmed by PM — no duplication with the pending "edición de
      voluntarias" UI spec; the two efforts are separate and compatible.
  - id: VG2
    question: "What physical dimensions should the carnet be for print purposes?"
    method: internal-review
    icp_required: null
    owner: PM
    status: answered
    answer: >
      Authoritative print spec: Canva template Cuidadoras Caracas
      (https://canva.link/03vyok16l02lf14). PM confirmed 2026-07-12 that
      this template has the correct dimensions. Native HTML/PDF rebuild must
      match that size and layout — no Canva API at runtime. Builder may
      export once from Canva to read exact mm/px for carnet_plantillas.config.
      Sample PDF (Ashly Monjes) is supplementary for field placement reference.
  - id: VG3
    question: "Does self-service carnet generation solve real volunteer pain, confirmed by a direct volunteer/ICP signal rather than team-observed only?"
    method: customer-interview
    icp_required: any
    owner: PM
    status: answered
    answer: >
      Confirmed by PM — the WhatsApp thread itself is a direct request: Dari
      asked on behalf of a specific volunteer who needed a carnet urgently
      and didn't have one. Treated as a real, direct volunteer-originated
      signal, not team-invented.

open_questions: []

open_questions_resolved:
  - id: OQ1
    question: "Exact photo requirements (min resolution, aspect ratio, moderation/content check)"
    resolved: 2026-07-12
    answer: >
      MVP defaults — portrait 3:4 crop in UI; min 480px on short side; max 5MB;
      JPEG, PNG, WebP, HEIC/HEIF; no automated content moderation at launch;
      UI hint: foto de rostro, fondo claro, sin filtros.
  - id: OQ2
    question: "Re-upload photo vs regenerate carnet"
    resolved: 2026-07-12
    answer: >
      No standalone photo edit in Mi cuenta. Volunteer uses Generar carnet
      (first time) or Regenerar carnet (when one exists); that flow requires
      uploading a (new) photo, queues generation, and replaces the previous
      downloadable carnet when the job completes. Optional photo at registration
      unchanged — volunteers without photo can upload via Generar carnet later.

