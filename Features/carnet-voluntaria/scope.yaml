jtbd:
  primary: >
    A registered volunteer generates a printable ID card with her photo so
    she can prove her affiliation with the group in the field.
  secondary: []

icp:
  primary_segment: "Volunteers (individual member, self-service)"
  secondary_segments: []
  excluded_segments:
    - "Moderators/admins generating carnets on behalf of volunteers"
  icp_match_required: any

in_scope:
  - "Optional photo upload field added to voluntarios-registro (registration form)"
  - "Photo upload/edit available post-registration in the member dashboard/portal, for volunteers already registered without a photo"
  - "\"Generate carnet\" action in the member dashboard, async (queue -> poll/notify -> download)"
  - "Carnet rendering is config-driven per group (group_id -> template config/assets), natively rebuilt (not Canva API); Cuidadoras Caracas is the one live template at launch"
  - "Output is a print-ready PDF/PNG at correct physical ID-card dimensions, with foto, nombre, apellido, cedula"

out_of_scope:
  - "Moderator/admin bulk-generation of carnets on behalf of volunteers — deferred: no admin surface requested yet"
  - "Physical printing/fulfillment/mailing of cards — deferred: digital output only is in scope, fulfillment is out of product scope"
  - "Canva Connect API / live sync back into Canva — deferred: rejected in favor of a natively rebuilt template, since Autofill/Bulk Create requires Canva Enterprise and a runtime dependency on Canva's domain"
  - "QR code / scannable verification on the carnet — deferred: not mentioned in evidence, nice-to-have"
  - "Self-serve template editor/designer UI for PMs to author new group templates — deferred: adding template #2 is a manual dev task for now, not a product feature yet"

success:
  user_outcome: >
    A volunteer who has uploaded a photo can generate and download a
    print-ready carnet from her dashboard within seconds, without asking a
    moderator for help.
  mvp_boundary: >
    Optional registration photo field + post-registration photo edit +
    single live template (Cuidadoras Caracas) rendered via a config-driven
    per-group system + async generate-and-download flow.

